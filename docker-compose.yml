version: "3.9"

services:
  db:
    image: postgres:16
    container_name: recipe_db
    environment:
      POSTGRES_USER: recipe_user
      POSTGRES_PASSWORD: recipe_password
      POSTGRES_DB: recipe_db
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U recipe_user -d recipe_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    container_name: recipe_api
    environment:
      APP_NAME: Recipe API
      APP_ENV: docker
      APP_DEBUG: "false"
      DATABASE_URL: postgresql+psycopg2://recipe_user:recipe_password@db:5432/recipe_db
      LOG_LEVEL: INFO
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    command: >
      bash -c "alembic upgrade head &&
               uvicorn app.main:app --host 0.0.0.0 --port 8000"
